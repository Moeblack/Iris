# 定时任务调度插件配置
#
# 启用后，LLM 可通过 manage_scheduled_tasks 工具
# 创建、管理定时任务，实现自动化调度。

# 是否启用调度器
enabled: true

# 安静时段配置
# 在安静时段内，非紧急任务将被跳过
quietHours:
  enabled: false
  windows:
    - start: "23:00"
      end: "07:00"
  # 是否允许紧急任务穿透安静时段
  allowUrgent: true

# 跳过近期活跃会话
# 如果目标会话在指定分钟内有过活动，则跳过本次投递
skipIfRecentActivity:
  enabled: false
  withinMinutes: 5
