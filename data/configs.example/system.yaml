# 系统配置

# 系统提示词（留空则使用默认）
systemPrompt: ""

# 工具执行最大轮次
maxToolRounds: 200

# 流式输出
stream: true

# 子代理最大嵌套深度（默认 3）
# maxAgentDepth: 3

# 默认模式（需与 modes.yaml 中定义的名称对应）
# defaultMode: code

# 记录 LLM 请求/响应日志（调试用，默认关闭）
# 开启后每次 LLM 调用会在 ~/.iris/logs/ 生成配对的请求和响应文件：
#   request_<timestamp>.json   — 请求（URL、headers、body）
#   response_<timestamp>.json  — 非流式响应原文
#   response_<timestamp>.txt   — 流式响应原文（SSE）
# logRequests: true
