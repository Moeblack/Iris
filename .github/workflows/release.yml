# ==========================================
#  Iris 自动构建 & 发布
#
#  触发条件：
#  1. push 以 v* 开头的 tag（如 v1.0.0）→ 自动创建 Release 并上传产物 + 发布到 npm
#  2. 手动触发 workflow_dispatch（仅构建，不发 Release）
#
#  构建方式：
#  使用 bun build --compile 为每个平台编译独立二进制。
#  产物内嵌 Bun 运行时 + opentui + 全部依赖，用户无需安装任何运行时。
#
#  分发渠道：
#  1. GitHub Release：二进制 tar.gz / zip
#  2. npm：irisagent 包装器包 + 平台二进制包
# ==========================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 全平台构建 ─────────────────────
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-latest
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - platform: darwin
            arch: arm64
            runner: macos-latest
          - platform: darwin
            arch: x64
            runner: macos-13
          - platform: windows
            arch: x64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (current platform)
        run: bun run build:compile -- --single

      # 打包 GitHub Release 产物
      - name: Archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd dist/bin/iris-${{ matrix.platform }}-${{ matrix.arch }}
          tar czf "$GITHUB_WORKSPACE/iris-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" bin/ data/
          echo "Archive size: $(du -sh $GITHUB_WORKSPACE/iris-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz | cut -f1)"

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/bin/iris-windows-${{ matrix.arch }}/bin/*","dist/bin/iris-windows-${{ matrix.arch }}/data/*" -DestinationPath "iris-windows-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            iris-*.tar.gz
            iris-*.zip
          retention-days: 30

      # 上传 npm 平台包产物（供 publish job 使用）
      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-iris-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/bin/iris-${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 7

  # ── 发布 GitHub Release ───────────────
  release:
    name: Create GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: iris-*
          merge-multiple: false

      - name: Prepare release files
        run: |
          mkdir -p release/
          find artifacts/ -name '*.tar.gz' -o -name '*.zip' | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  # ── 发布到 npm ───────────────────
  publish-npm:
    name: Publish to npm
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      # 下载所有平台包产物
      - name: Download npm package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/bin/
          pattern: npm-iris-*
          merge-multiple: false

      - name: Flatten artifact directories
        run: |
          cd dist/bin
          for d in npm-iris-*/; do
            pkg_name=$(basename "$d" | sed 's/^npm-//')
            if [ ! -d "$pkg_name" ]; then
              mv "$d" "$pkg_name"
            fi
          done
          rm -rf npm-iris-*
          ls -la

      - name: Publish
        run: bun run script/publish.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
